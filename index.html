<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles para Salo Pooh 🐻</title>
    <style>
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%); font-family: 'Comic Sans MS', cursive; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { background: rgba(255,255,255,0.95); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 500px; margin: 20px; }
        img { max-width: 100%; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        h1 { color: #e17055; font-size: 2.3em; margin: 20px 0 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        p { color: #555; font-size: 1.2em; line-height: 1.6; }
        .corazon { font-size: 2.5em; animation: latir 1.5s infinite; }
        @keyframes latir { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <img src="salosita.png" alt="Salo Pooh">
        <h1>Detalles para Salo Pooh</h1>
        <p>Tú eres la más linda osita tierna del bosque 🐻🍯</p>
        <p>Esta Salosita eres tú, tan linda como siempre.</p>
        <p>Quiero que estés segura conmigo siempre y que no tengas inseguridades 💛</p>
        <div class="corazon">💖</div>
    </div>
</body>
</html>
