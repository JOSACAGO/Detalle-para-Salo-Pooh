<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles para Salo Pooh 🐻</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { 
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            margin: 20px;
        }
        img { 
            max-width: 100%; 
            border-radius: 15px;
            margin-bottom: 20px;
        }
        h1 { 
            color: #e17055; 
            font-size: 2em;
            margin: 10px 0;
        }
        .message { 
            color: #555; 
            font-size: 1.2em;
            line-height: 1.6;
            margin: 20px 0;
        }
        .signature {
            color: #e17055;
            font-weight: bold;
            font-size: 1.1em;
            margin-top: 15px;
        }
        .corazon { 
            font-size: 2.5em; 
            animation: latir 1.5s infinite;
            margin-top: 20px;
        }
        @keyframes latir { 
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="salosita.png" alt="Salo Pooh">
        <h1>Pa' mi Salo Pooh favorita 🐻🍯</h1>
        <p class="message">
            No sé si lo notes, pero te volviste mi parte favorita del día. <br>
            Solo quería que lo supieras... y que tengas esto pa' cuando necesites sonreír 💛
        </p>
        <div class="signature">Alguien que piensa mucho en ti</div>
        <div class="corazon">🪐</div>
    </div>
</body>
  </html>
